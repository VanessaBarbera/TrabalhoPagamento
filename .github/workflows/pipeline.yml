name: CI - Testes Automatizados

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: '0 12 * * *'

jobs:
  teste:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Corrigir permissão do Mocha
        run: chmod +x ./node_modules/.bin/mocha

      - name: Executar testes e gerar relatório
        run: |
          node ./node_modules/mocha/bin/mocha.js
          echo "Testes executados com sucesso" > relatorio-testes.txt

      - name: Upload do relatório
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: relatorio-testes.txt
